<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            width: 400px;
            height: 550px;
            background: #2c2c3e;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .header {
            padding: 15px;
            background: #4CAF50;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
        }

        .user {
            background: #4CAF50;
            align-self: flex-end;
        }

        .bot {
            background: #444;
            align-self: flex-start;
        }

        .typing {
            font-size: 12px;
            color: #aaa;
            margin-left: 5px;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #555;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 8px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .controls {
            display: flex;
            gap: 5px;
        }

        .light-mode {
            background: #f4f4f4;
            color: black;
        }

        .light-mode .container {
            background: white;
        }

        .light-mode .bot {
            background: #ddd;
        }

        .light-mode input {
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <span>🤖 AI Chatbot</span>
        <div class="controls">
            <button onclick="toggleMode()">🌙</button>
            <button onclick="clearChat()">🗑</button>
        </div>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input id="msg" placeholder="Type a message..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
async function send() {
    let input = document.getElementById("msg");
    let message = input.value;

    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    // user message
    let userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = message;
    chatBox.appendChild(userMsg);

    input.value = "";

    // typing indicator
    let typing = document.createElement("div");
    typing.className = "typing";
    typing.innerText = "Bot is typing...";
    chatBox.appendChild(typing);

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        let res = await fetch("https://chatbot-deploy-xxxx.onrender.com/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: message})
        });

        let data = await res.json();

        chatBox.removeChild(typing);

        let botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerText = data.response;
        chatBox.appendChild(botMsg);

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        console.log("ERROR:", error);
        typing.innerText = "Error: " + error;
    }
}

// Enter key support
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// clear chat
function clearChat() {
    document.getElementById("chat-box").innerHTML = "";
}

// dark mode toggle
function toggleMode() {
    document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
