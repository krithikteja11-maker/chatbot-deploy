<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body {
            background: #0f172a;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: #1e293b;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #22c55e;
            padding: 15px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .input-area {
            display: flex;
            padding: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
        }

        .user {
            text-align: right;
            margin: 5px;
        }

        .bot {
            text-align: left;
            margin: 5px;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">🤖 AI Chatbot</div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input id="userInput" placeholder="Type message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="chat.js"></script>

</body>
</html>
