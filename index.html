<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 350px;
            height: 550px;
            background: #1e293b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .header {
            background: #22c55e;
            color: white;
            padding: 15px;
            font-weight: bold;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user {
            background: #22c55e;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #334155;
            color: white;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #0f172a;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">🤖 AI Chatbot</div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input id="input" type="text" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    console.log("DIRECT BACKEND VERSION ✅");

    function addMessage(text, type) {
        const chatBox = document.getElementById("chat-box");

        const msg = document.createElement("div");
        msg.className = "message " + type;
        msg.innerText = text;

        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById("input");
        const message = input.value.trim();

        if (!message) return;

        addMessage(message, "user");
        input.value = "";

        try {
            const response = await fetch("https://chatbot-deploy-g0i7.onrender.com/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            addMessage(data.response, "bot");

        } catch (error) {
            console.error(error);
            addMessage("⚠️ Failed to connect to server", "bot");
        }
    }

    document.getElementById("input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
